<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FF620E">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ร้านค้า">
  <title>วัตถุดิบ · ร้านของฉัน</title>
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/components.css">
</head>
<body data-page="ing">

  <header class="app-header">
    <div class="container">
      <div>
        <div class="sub">คลังของร้าน</div>
        <h1>วัตถุดิบ</h1>
      </div>
      <button class="add-btn" id="btnAdd" aria-label="เพิ่มวัตถุดิบ">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>
  </header>

  <main class="container">
    <div id="ingList"></div>
  </main>

  <!-- Sheet: เพิ่ม/แก้ไขวัตถุดิบ -->
  <div class="modal-backdrop" id="ingSheetBackdrop"></div>
  <div class="sheet" id="ingSheet">
    <div class="grabber"></div>
    <h2 id="ingSheetTitle">เพิ่มวัตถุดิบ</h2>

    <div class="field">
      <label>ชื่อวัตถุดิบ</label>
      <input type="text" id="fName" placeholder="เช่น ผงชาไทย, นมข้นหวาน, แก้ว 16oz">
    </div>
    <div class="field">
      <label>หน่วยนับ</label>
      <input type="text" id="fUnit" placeholder="เช่น g, ml, ชิ้น, ฟอง" list="unitList">
      <datalist id="unitList">
        <option value="g"><option value="kg"><option value="ml"><option value="ลิตร">
        <option value="ชิ้น"><option value="ฟอง"><option value="ใบ"><option value="ถุง">
      </datalist>
    </div>

    <div class="field">
      <label>จุดเตือนใกล้หมด <span class="muted">(ไม่บังคับ)</span></label>
      <input type="number" id="fLow" inputmode="decimal" placeholder="เช่น 100 — เหลือต่ำกว่านี้จะเตือน">
    </div>

    <div id="buyBlock">
      <div class="field-row">
        <div class="field">
          <label>ซื้อมาจำนวน</label>
          <input type="number" id="fQty" inputmode="decimal" placeholder="1000">
        </div>
        <div class="field">
          <label>ราคาที่ซื้อ (บาท)</label>
          <input type="number" id="fPrice" inputmode="decimal" placeholder="45">
        </div>
      </div>
      <div class="cost-box" id="costPreview" style="display:none">
        <div class="spread"><span>ต้นทุนต่อหน่วย</span><span class="bold orange" id="cpuText">—</span></div>
      </div>
    </div>

    <div id="editBlock" style="display:none">
      <div class="field-row">
        <div class="field">
          <label>ต้นทุนต่อหน่วย (บาท)</label>
          <input type="number" id="fCpu" inputmode="decimal" step="any">
        </div>
        <div class="field">
          <label>ปรับยอดคงเหลือ</label>
          <input type="number" id="fStock" inputmode="decimal" step="any">
        </div>
      </div>
      <p class="hint small muted">ปรับยอดคงเหลือใช้กรณีนับสต็อกจริงแล้วไม่ตรงกับในแอพ</p>
    </div>

    <button class="btn btn-primary btn-block mt-16" id="btnSave">บันทึก</button>
    <button class="btn btn-danger btn-block mt-8" id="btnDelete" style="display:none">ลบวัตถุดิบนี้</button>
    <button class="btn btn-secondary btn-block mt-8" id="btnCancel">ยกเลิก</button>
  </div>

  <!-- Sheet: ซื้อเพิ่ม -->
  <div class="modal-backdrop" id="buySheetBackdrop"></div>
  <div class="sheet" id="buySheet">
    <div class="grabber"></div>
    <h2 id="buyTitle">ซื้อเพิ่ม</h2>
    <div class="field-row">
      <div class="field">
        <label>จำนวนที่ซื้อ <span id="buyUnit" class="muted"></span></label>
        <input type="number" id="bQty" inputmode="decimal" placeholder="1000">
      </div>
      <div class="field">
        <label>ราคาที่จ่าย (บาท)</label>
        <input type="number" id="bPrice" inputmode="decimal" placeholder="45">
      </div>
    </div>
    <div class="cost-box">
      <div class="spread"><span>ต้นทุนต่อหน่วยใหม่</span><span class="bold orange" id="bCpu">—</span></div>
      <div class="spread small muted"><span>ระบบจะอัพเดทต้นทุนตามราคาซื้อล่าสุด และบวกเข้าสต็อก</span></div>
    </div>
    <button class="btn btn-primary btn-block" id="btnBuySave">บันทึกการซื้อ</button>
    <button class="btn btn-secondary btn-block mt-8" id="btnBuyCancel">ยกเลิก</button>
  </div>

  <script src="./js/store.js"></script>
  <script src="./js/calc.js"></script>
  <script src="./js/nav.js"></script>
  <script src="./js/ingredients.js"></script>
  <script src="./js/pwa.js"></script>
</body>
</html>
