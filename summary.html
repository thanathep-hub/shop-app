<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FF620E">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ร้านค้า">
  <title>สรุป · ร้านของฉัน</title>
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/components.css">
</head>
<body data-page="sum">

  <header class="app-header">
    <div class="container">
      <div>
        <div class="sub">ภาพรวมร้าน</div>
        <h1>สรุป</h1>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="seg" id="rangeSeg">
      <button data-r="today" class="active">วันนี้</button>
      <button data-r="d7">7 วัน</button>
      <button data-r="month">เดือนนี้</button>
      <button data-r="all">ทั้งหมด</button>
    </div>

    <div class="stat-grid mt-16" id="stats"></div>

    <div class="section-title">ยอดขาย 7 วันล่าสุด</div>
    <div class="card" id="chart7d" style="padding:12px 14px"></div>

    <div class="section-title">เมนูขายดี</div>
    <div id="topMenus"></div>

    <div class="section-title">ออเดอร์ล่าสุด <span class="muted" style="font-weight:500">· แตะรายการเพื่อยกเลิก</span></div>
    <div id="recentOrders"></div>
  </main>

  <script src="./js/store.js"></script>
  <script src="./js/calc.js"></script>
  <script src="./js/nav.js"></script>
  <script src="./js/summary.js"></script>
  <script src="./js/pwa.js"></script>
</body>
</html>
